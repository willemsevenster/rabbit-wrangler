appId: com.frontforge.rabbitwrangler
productName: Rabbit Wrangler
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierrc.yaml,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
  category: Development
npmRebuild: false
publish: null
