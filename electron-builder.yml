appId: com.frontforge.rabbitwrangler
productName: Rabbit Wrangler
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierrc.yaml,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  target:
    - nsis
  # --- Windows code signing (signing-ready; off until a cert is set up) ---
  # electron-builder auto-reads CSC_LINK + CSC_KEY_PASSWORD from the environment
  # at build time, so enabling signing later is just adding those CI secrets —
  # no config/code change needed here.
nsis:
  oneClick: true
  perMachine: false # per-user install ⇒ unsigned auto-updates apply without a UAC prompt
  allowToChangeInstallationDirectory: false
linux:
  # AppImage is the auto-updating artifact (electron-updater only self-updates the
  # AppImage on Linux); deb + rpm are conventional installers for apt/dnf distros.
  target:
    - AppImage
    - deb
    - rpm
  category: Development
  maintainer: frontforge <willem@frontforge.com> # required for .deb packages
  synopsis: Desktop tool for operating RabbitMQ clusters
npmRebuild: false
# Installers + update metadata (latest.yml / latest-linux.yml + blockmaps) publish
# to GitHub Releases; the running app reads the same source via app-update.yml.
publish:
  provider: github
  owner: willemsevenster
  repo: rabbit-wrangler
