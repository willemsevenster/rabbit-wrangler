name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI only type-checks / lints / bundles — it never launches Electron and
      # never packages — so we install with --ignore-scripts below (skipping
      # Electron's binary download and the esbuild / electron-winstaller
      # postinstalls). esbuild's binary still ships via its platform
      # optional-dependency, so bundling works. This also sidesteps pnpm's hard
      # "ignored builds" error in CI. Disable the pre-run deps check so the
      # typecheck/lint/build scripts don't re-trigger that same error.
      npm_config_verify_deps_before_run: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0 # pin to match the project; newer pnpm 11 needs Node 22.13+

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
